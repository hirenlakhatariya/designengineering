<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Project Registration Form</title>
	<style type="text/css">
		body{
			background-image: url(https://cdn.wallpapersafari.com/58/53/6zV7qe.jpg);
			background-size: 100%;
			background-repeat: no-repeat;
			background-attachment: fixed;
		}
	
	</style>
</head>
<body >
	<form>
		<table align="center">
		<tr>
			<td>
				<font size="15" color="white" style="font-family:Zapf-Chancery;">
					<b><u>
						&nbsp;Project Registration Form
					</u></b>
				</font>
			</td>
		</tr>
		
	</table><br/><br/>
	<table cellpadding="5" cellspacing="20" align="center">
		<tr>
			<td>
				<font size="4" color="white">Enrollment No
				</font>
			<td>
				<font size="4" color="white">:</font>
			</td>
			<td>
				<input type="text" name="" placeholder="Enter Your Enrollment number" maxlength="12" required/>
			</td>
		</tr>
		<tr>
			<td>
				<font size="4" color="white">Name
				</font>
			<td>
				<font size="4" color="white">:</font>
			</td>
			<td>
				<input type="text" name="" placeholder="Enter Your Name" maxlength="12" required/>
			</td>
		</tr>
		<tr>
			<td>
				<font size="4" color="white">Branch</font>
			</td>
			<td>
				<font size="4" color="white">:</font>
			</td>
			<td>
				<select>
					<option>Computer Engineering</option>
					<option>Electrical Engineering</option>
					<option>Michanical Engineering</option>
					<option>Civil Engineering</option>
				</select>
			</td>
		</tr>
		<tr>
			<td><font size="4" color="white">Semester</font></td>
			<td><font size="4" color="white">:</font></td>
			<td>
				<select>
					<option>Sem 1</option>
					<option>Sem 2</option>
					<option>Sem 3</option>
					<option>Sem 4</option>
					<option>Sem 5</option>
					<option>Sem 6</option>
					<option>Sem 7</option>
					<option>Sem 8</option>

				</select>
			</td>
		</tr>
		<tr>
			<td>
				<font size="4" color="white">College Name  <font size="4" color="white">&nbsp;*</font></font>
			</td>
			<td>
				<font size="4" color="white">:</font>
			</td>
			<td>
				<textarea rows="2"></textarea>
			</td>
		</tr>
		<tr>
			<td>
				<font size="4" color="white">Project Title <font size="4" color="white">&nbsp;*</font></font>
			</td>
			<td>
				<font size="4" color="white">:</font>
			</td>
			<td>
				<input type="text" name="">
			</td>
		</tr>
		<tr>
			<td>
				<font size="4" color="white">Project Description  <font size="4" color="white">&nbsp;*</font></font>
			</td>
			<td>
				<font size="4" color="white">:</font>
			</td>
			<td>
				<textarea rows="2"></textarea>
			</td>
		</tr>
		<tr>
			<td><font size="4" color="white">Technology</font></td>
			<td><font size="4" color="white">:</font></td>
			<td>
				<select>
					<option>Communication Technology</option>
					<option>Construction Technology</option>
					<option>Product Technology</option>
					<option>Medical Technology</option>
					<option>Architecture Technology</option>
					<option>Business Technology</option>
					<option>Educational Technology</option>
					<option>Information Technology</option>

				</select>
			</td>

		</tr>

	</table>
	<table align="center">
		<tr align="right"><br/><br/>s
			<td></td>
			<td><input type="reset" name=""></td>
			<td><input type="submit" name=""></td>
		</tr>
	</table>
		
	
	</form>

</body>
</html>
