<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Vaccine Registration Form</title>
	<style type="text/css">
		body{
			background-image: url(https://images.theconversation.com/files/368661/original/file-20201110-19-70s6ki.jpg?ixlib=rb-1.1.0&rect=0%2C20%2C6720%2C3360&q=45&auto=format&w=1356&h=668&fit=crop);
			background-size: 100%;
			background-repeat: no-repeat;
			background-attachment: fixed;
		}
	
	</style>
</head>
<body>
	<form>
		<table>
		<tr>
			<td>
				<font size="15" color="white" style="font-family:Zapf-Chancery;">
					<b>
						Vaccine Registration Form
					</b>
				</font>
			</td>
		</tr>
		<tr>
			<td>
				<font size="5" color="white" style="font-family:Zapf-Chancery;">
					<b>
						________________________________________________
					</b>
				</font>
			</td>
		</tr>
	</table>
	<table cellpadding="5" cellspacing="10">
		<tr>
			<td><font size="4" color="white">Name&nbsp;&nbsp;:&nbsp;<font size="4" color="red">&nbsp;*</font></font>
		</td>
		</tr>
		<tr>		
			<td><input type="text" name="" placeholder="First Name" required/>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<input type="text" name="" placeholder="Last Name" required/></td>
		</tr>
		<tr>
			<td>
				<font size="4" color="white">Mobile Number&nbsp;&nbsp;:&nbsp;</font><font size="4" color="red">&nbsp;*</font>
			</td>
		</tr>
		<tr>
			<td>
				<input type="text" name="" pattern="[0-9]{10}" title="Please enter 10 digits number" placeholder="Enter Your Mobile Number" required/>
			</td>
		</tr>
		<tr>
			<td>
				<font size="4" color="white">Aadhar Number&nbsp;&nbsp;:&nbsp;</font><font size="4" color="red">&nbsp;*</font>
			</td>
		</tr>
		<tr>		
			<td>
				<input type="text" name="" placeholder="XXXX-XXXX-XXXX-XXXX" required/>
			</td>
		</tr>
		<tr>
			<td>
				<font size="4" color="white">Vaccine Name&nbsp;&nbsp;:&nbsp;&nbsp; </font></font>
				<select>
					<option>COVAXIN</option>
					<option>COVISHIELD</option>
				</select>
			</td>
			
		</tr>
		<tr>		
			<td>
				<font size="4" color="white">Vaccine Center Name<font size="4" color="red">&nbsp;*</font>&nbsp;&nbsp;:&nbsp;&nbsp; </font></font>
				<input type="text" name="" placeholder="Enter Vaccine Center Name" required/>
			</td>
		</tr>
		<tr>
			<td>
				<font size="4" color="white">Date Of &nbsp;Dose&nbsp;&nbsp;:&nbsp;&nbsp;</font></font>
				<input type="date" name="">
			</td>
			
		</tr>
		<tr>
			<td>
				<font size="4" color="white">Dose Number&nbsp;&nbsp;:&nbsp;&nbsp; </font></font>
				<select>
					<option>1st</option>
					<option>2nd</option>
				</select>
			</td>
		</tr>
		<tr align="right">
		<td><br/><br/>
			<input type="reset" name="reset"> &nbsp;<input type="submit" value="submit"/>
		</td>
	</tr>
</table>
<table>
	<tr>
			<td>
				<font size="5" color="white" style="font-family:Zapf-Chancery;">
					<b>
						________________________________________________
					</b>
				</font>
			</td>
		</tr>
	</table>
	</form>
</body>
</html>
