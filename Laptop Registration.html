<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Laptop Registration Form</title>
	<style type="text/css">
		body{
			background-image: url(279547.jpg);
				background-size: 100%;
			background-repeat: no-repeat;
			background-attachment: fixed;
		}
	</style>
</head>
<body>	
	<font color="white">
	<table>
		<tr><td>

		
	
	<font size="7" color="white"></h1><b><u>Employee Registration Form</u></b></font>
	<form style="font-family:Zapf-Chancery;">
		<br/>
		<br/>
	</table>
	<table cellpadding=10>
		<tr>
			<td><font size="5">Roll Number<font size="5" color="red">&nbsp;*</font></font></td>
			<td><font size="5">&nbsp;:&nbsp;</font></td>
			<td><font size="5"><input type="text" name="" placeholder="Enter Your Roll Number" maxlength="3" required/></font></td>
		</tr>
		<tr>	

			<td><font size="5">Enroment Number<font size="5" color="red">&nbsp;*</font></font></td>
			<td><font size="5">&nbsp;:&nbsp;</font></td>
			<td><font size="5"><input type="text" name="" placeholder="Enter Your Enrollment Number" maxlength="12" required/></font></td>
		</tr>
		<tr>	

			<td><font size="5">Name<font size="5" color="red">&nbsp;*</font></font></td>
			<td><font size="5">&nbsp;:&nbsp;</font></td>
			<td><input type="text" name="" placeholder="First" required/></td>
			<td><input type="text" name="" placeholder="Last" required/></td>
			<td><input type="text" name="" placeholder="Surname" required/></td>
		</tr>
		<tr>
			<td><font size="5">Branch</font></td>
			<td><font size="5">&nbsp;:&nbsp;</font></td>
			<td>
				<select>
					<option>Computer Engineering</option>
					<option>Electrical Engineering</option>
					<option>Michanical Engineering</option>
					<option>Civil Engineering</option>
				</select>
			</td>
		</tr>
		<tr>
			<td><font size="5">Semester</font></td>
			<td><font size="5">&nbsp;:&nbsp;</font></td>
			<td>
				<select>
					<option>Sem 1</option>
					<option>Sem 2</option>
					<option>Sem 3</option>
					<option>Sem 4</option>
					<option>Sem 5</option>
					<option>Sem 6</option>
					<option>Sem 7</option>
					<option>Sem 8</option>

				</select>
			</td>
		</tr>
		<tr>
				<td><font size="5">Mobile Number<font size="5" color="red">&nbsp;*</font></font></td>
				<td><font size="5">&nbsp;:&nbsp;</font></td>
				<td><input type="text" name="" pattern="[0-9]{10}" title="Please enter 10 digits number" placeholder="Enter Your Mobile Number" required/></td>
		</tr>
		<tr>		
				<td><font size="5">Email Id<font size="5" color="red">&nbsp;*</font></font></td>
				<td><font size="5">:</font></td>
				<td>
					<input type="email" name="" placeholder="Enter your email address" required/>
				</td>
			</tr>
			<tr>
				<td><font size="5">Assigned IP Address<font size="5" color="red">&nbsp;*</font></font></td>
				<td><font size="5">&nbsp;:&nbsp;</font></td>
				<td><input type="text" name="" pattern="[0-9]{3}.[0-9]{3}.[0-9]{3}.[0-9]{1}" placeholder="384.654.154.1" required/></td>
			</tr>
			<tr>
				<td><font size="5">Laptop MAC Address<font size="5" color="red">&nbsp;*</font></font></td>
				<td><font size="5">&nbsp;:&nbsp;</font></td>
				<td><input type="text" name=""  placeholder="3A-34-52-C4-69-B8" required/></td>
			</tr>	
			<tr>
					<td></td>
					<td></td>
		<td>
			<input type="reset" name="reset"> &nbsp;
		<input type="submit" value="submit"/></td>
	</tr>
	</table>


	</form>
</font>
</body>
</html>
