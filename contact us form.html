<!DOCTYPE html>
<html>
<head>
		<meta charset="utf-8">
			<title>Contact Us Form</title>
			<style type="text/css">
		body{
			background-image: url(https://cdn.wallpapersafari.com/35/22/6mEgje.jpg);
			background-size: 100%;
			background-repeat: no-repeat;
			background-attachment: fixed;
		}
		#INDEX {
			color: white;
			font-size: 20PX;
		}
	</style>
</head>
	<body>
		<form>
	<table align="center">
		<tr>
			<td>
				<font size="15" color="white" style="font-family:Zapf-Chancery;">
					<b>
						Contact Us Form
					</b>
				</font>
			</td>
		</tr>
	</table>
	<table align="center" cellpadding="5" cellspacing="10">
		<br/>
		<br/>

			<tr>
			<td><font size="4" color="white">Name</font>
		</td>
		</tr>
		<tr>		
			<td><input type="text" name="" placeholder="First" required/></td>
			<td><input type="text" name="" placeholder="Last" required/></td>
			<td><input type="text" name="" placeholder="Surname" required/></td>
	</tr>
		<tr>
				<td><font size="4" color="white">Mobile Number <font size="4" color="white">&nbsp;*</font></font></td>
		</tr>
		<tr>
			<td>
				<input type="text" name="" pattern="[0-9]{10}" title="Please enter 10 digits number" placeholder="Enter Your Mobile Number" required/>
			</td>
		</tr>
		<tr>
			<td>
				<font size="4" color="white">Email Id <font size="4" color="white">&nbsp;*</font></font>
			</td>
		</tr>
		<tr>
			<td>
					<input type="email" name="" placeholder="example123@.com" required/>
				</td>
		</tr>
		<tr>
			<td><font size="4" color="white">Subject <font size="4" color="white">&nbsp;*</font></font>
		</td>
		</tr>
		<tr>		
			<td><input type="text" name="" placeholder="(5 to 10 Words)" required/></td>
		</tr>
		<tr>
			<td><font size="4" color="white">Message</font>
		</td>
		</tr>
		<tr>
			<td colspan="3">
				<textarea placeholder="Description" rows="3"></textarea>
			</td>
		</tr>
		<tr align="right">
			<td></td>
			<td><input type="reset" name=""></td>
			<td><input type="submit" name=""></td>
		</tr>
		
	</table>
		</form>
	</body>
</html>
