<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Student Registration Form</title>
	<style type="text/css">
		body{
			background-image: url(https://dyrdkqpaj50j2.cloudfront.net/media/catalog/product/cache/35/image/9df78eab33525d08d6e5fb8d27136e95/l/i/light_blue-282-sud-1.jpg);
			background-size: 100%;
			background-repeat: no-repeat;
			background-attachment: fixed;
		}
	</style>
</head>
<body background="">
<form>
<font color="black">
	<font size="7" style="Helvetica">
		<table align="center"><tr>
			<td align="center"><u><font color="red">Student Registration Form</font></u></td>
		</tr>
</table>
	</font>
	<br/>
	<table cellpadding="5" cellspacing="10" align="center" width="70%">
		<tr>
			<td colspan="10" bgcolor="33ADFF" align="center">Personal Details</td>
		</tr>
		<tr>
			<td><font size="4">Roll Number</font></td>
			<td><font size="4">:</font></td>
			<td><input type="text" name="" placeholder="Enter Your Roll Number" maxlength="3" required/></td>
			<td></td>
			<td></td>
			<td></td>
			<td></td>
			<td><font size="4">Enrollment No.</font>
			<td><font size="4">:</font>
			<td><input type="text" name="" placeholder="Enter Your Enrollment number" maxlength="12" required/></td>
		</tr>


		<tr>
			<td><font size="4">Name</font>
			<td><font size="4">:</font>
			<td colspan="5"><input type="text" name="" placeholder="Enter Your Name"/></td>
		</tr>
		<tr>
			<td><font size="4">Branch</font></td>
			<td><font size="4">:</font></td>
			<td>
				<select>
					<option>Computer Engineering</option>
					<option>Electrical Engineering</option>
					<option>Michanical Engineering</option>
					<option>Civil Engineering</option>
				</select>
			</td>
		</tr>
		<tr>
			<td><font size="4">Semester</font></td>
			<td><font size="4">:</font></td>
			<td>
				<select>
					<option>Sem 1</option>
					<option>Sem 2</option>
					<option>Sem 3</option>
					<option>Sem 4</option>
					<option>Sem 5</option>
					<option>Sem 6</option>
					<option>Sem 7</option>
					<option>Sem 8</option>

				</select>
			</td>
		</tr>
		<tr>
				<td><font size="4">Date Of Birth</font></td>
				<td><font size="4">:</font></td>
				<td><input type="date" value=""/></td>
			</tr>
				<tr>
				<td><font size="4">Gender</font></td>
				<td><font size="4">:</font></td>
				<td><input type="radio" name="Gender"/>male <br/><input type="radio" name="Gender"/>Female</td>
			</tr>
				<tr>
					<td><font size="4">Blood Group</font></td>
				<td><font size="4">:</font></td>
				<td><select>
					<option>A+</option>
					<option>A-</option>
					<option>B+</option>
					<option>B-</option>
					<option>O+</option>
					<option>O-</option>
					<option>AB+</option>
					<option>AB-</option>

				</select></td>
				</tr>
			
		<tr>
			<td colspan="10" bgcolor="33ADFF" align="center">Contact Details</td>
		</tr>	
			<tr>
				<td><font size="4">Mobile Number</font></td>
				<td><font size="4">:</font></td>
				<td><input type="text" name="" pattern="[0-9]{10}" title="Please enter 10 digits number" placeholder="Enter Your Mobile Number" required/></td>
				<td></td>
				<td></td>
				<td></td>
				<td></td>
				<td><font size="4">Email Id</font></td>
				<td><font size="4">:</font></td>
				<td>
					<input type="email" name="" placeholder="Enter your email address" required/>
				</td>
			</tr>
			<tr>
			<td colspan="10" bgcolor="33ADFF" align="center">Address Details</td>
		</tr>
				<tr>
					<td><font size="4">City</font></td>
				<td><font size="4">:</font></td>
					<td>
						<select>
					<option>Ahmedabad</option>
					<option>Surat</option>
					<option>Vadodara</option>
					<option>Rajkot</option>
					<option>Bhavnagar</option>
					<option>Jamnagar</option>
					<option>Junagadh</option>
					<option>Gandhinagar</option>
					<option>Gandhidham</option>
					<option>Anand</option>
					<option>Navsari</option>
					<option>Morbi</option>
					<option>Nadiad</option>
					<option>Surendranagar</option>
					<option>Bharuch</option>
					<option>Mahsana</option>
					<option>Bhuj</option>
					<option>Porbandar</option>
					<option>Palanpur</option>
					<option>Valsad</option>
					<option>Vapi</option>
					<option>Gondal</option>
					<option>Somnath</option>
					<option>Godhara</option>
					<option>Patan</option>
					<option>Kalol,Gandhinagar</option>
					<option>Dahod</option>
					<option>Botad</option>
					<option>Amreli</option>
					<option>Disha</option>
					<option>Jetpur</option>	
				</select></td>
				</tr>
				<tr>
					<td><font size="4">College Name</font></td>
				<td><font size="4">:</font></td>
				<td><textarea rows="2" cols="30"></textarea></td>
				</tr>
				<tr>
					<td><font size="4">Address</font></td>
				<td><font size="4">:</font></td>
				<td><textarea rows="3" cols="30"></textarea></td>
				</tr>

				<tr>
					<td></td>
					<td></td>
		<td>
			<input type="reset" name="reset"> &nbsp;
		</td>
	</tr>
	<tr><td></td>
					<td></td>
		<td>
		<input type="submit" value="submit"/></td>
	</tr>
	</table>
	
</font>
</form>
</body>
</html>
